<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container">
      <a class="navbar-brand" routerLinkActive="/">Dating App<3</a>
     
        <ul class="navbar-nav me-auto mb-2 mb-md-0" >
          <ng-container *ngIf="accounService.currentUser$ | async">
            <li class="nav-item">
              <a class="nav-link"routerLink="/members" routerLinkActive="active">Matches</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" routerLink="/lists" routerLinkActive="active">List</a>
            </li>
            <li class="nav-item">
              <a class="nav-link " routerLink="/messages" routerLinkActive="active">Messages</a>
            </li>
          </ng-container>
          <li class="nav-item">
            <a class="nav-link " routerLink="/errors" routerLinkActive="active">Errors</a>
          </li>
        </ul>

          <div class="dropdown" *ngIf="(accounService.currentUser$ | async) as user" dropdown>
            <a class="dropdown-toggle text-light" dropdownToggle>Welcome {{user.username}}</a>
            <div class="dropdown-menu" *dropdownMenu>
              <a class="dropdown-item" routerLink="/member/edit">Edit Profile</a>
              <a class="dropdown-item" (click)="logout()">Logout</a>
            </div>
          </div>
          
        <form *ngIf="!(accounService.currentUser$ | async)" #loginForms="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
          <input 
            name="username"
            [(ngModel)]="model.username"
            [ngModelOptions]="{standalone: true}"
            class="form-control me-2" 
            type="text" 
            placeholder="Username">

          <input 
            username="password"
            [(ngModel)]="model.password"
            [ngModelOptions]="{standalone: true}"
            class="form-control me-2" 
            type="password" 
            placeholder="Password">

          <button class="btn btn-success" type="submit">Login</button>
        </form>
    
    </div>
  </nav>
